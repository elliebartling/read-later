name: Ship TestFlight

# Ships a signed build to App Store Connect / TestFlight.
# Triggers: manual "Run workflow" only — ship deliberately so a burst of
# merges to main produces one build you choose, not one per commit.
#
# Required repo secrets:
#   APP_STORE_CONNECT_API_KEY_ID    — Key ID (e.g. GM7RX2Y3B8)
#   APP_STORE_CONNECT_ISSUER_ID     — Issuer UUID
#   APP_STORE_CONNECT_API_KEY_P8    — full .p8 private key contents

on:
  workflow_dispatch:

concurrency:
  group: ship-testflight
  cancel-in-progress: true

jobs:
  ship:
    # macos-26 ships Xcode 26 (iOS 26 SDK). App Store Connect rejects uploads
    # built with an older SDK — see the "Select Xcode" step for the guard.
    runs-on: macos-26
    timeout-minutes: 60
    defaults:
      run:
        shell: bash

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      # Last manually uploaded build was 3. First Actions ship → 4.
      BUILD_NUMBER_OFFSET: 3
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Check App Store Connect secrets
        env:
          ASC_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          if [ -z "$ASC_KEY_ID" ] || [ -z "$ASC_ISSUER_ID" ] || [ -z "$ASC_API_KEY_P8" ]; then
            echo "::error::Missing App Store Connect secrets. Set APP_STORE_CONNECT_API_KEY_ID, APP_STORE_CONNECT_ISSUER_ID, and APP_STORE_CONNECT_API_KEY_P8 on this repo."
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode
        run: |
          # App Store Connect requires the iOS 26 SDK (Xcode 26+). If the
          # default Xcode is older, pick the newest Xcode 26.x on the runner.
          IOS_SDK=$(xcodebuild -showsdks 2>/dev/null | sed -nE 's/.*iphoneos([0-9]+).*/\1/p' | sort -n | tail -1)
          if [ -z "$IOS_SDK" ] || [ "$IOS_SDK" -lt 26 ]; then
            NEWER=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
            if [ -n "$NEWER" ]; then
              echo "Default Xcode has iOS SDK '$IOS_SDK'; switching to $NEWER"
              export DEVELOPER_DIR="$NEWER/Contents/Developer"
              echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> "$GITHUB_ENV"
            fi
          fi
          sudo xcode-select -s "$DEVELOPER_DIR"
          xcodebuild -version
          IOS_SDK=$(xcodebuild -showsdks 2>/dev/null | sed -nE 's/.*iphoneos([0-9]+).*/\1/p' | sort -n | tail -1)
          echo "Selected iOS SDK: ${IOS_SDK:-unknown}"
          if [ -z "$IOS_SDK" ] || [ "$IOS_SDK" -lt 26 ]; then
            echo "::error::iOS SDK $IOS_SDK is too old. App Store Connect requires the iOS 26 SDK (Xcode 26+). No suitable Xcode found on this runner."
            exit 1
          fi

      - name: Set build number
        id: version
        run: |
          BUILD=$(( ${{ github.run_number }} + BUILD_NUMBER_OFFSET ))
          MARKETING=$(grep -E '^\s*MARKETING_VERSION:' project.yml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          sed -i '' -E "s/CURRENT_PROJECT_VERSION: \"[^\"]+\"/CURRENT_PROJECT_VERSION: \"${BUILD}\"/" project.yml
          echo "build=${BUILD}" >> "$GITHUB_OUTPUT"
          echo "marketing=${MARKETING}" >> "$GITHUB_OUTPUT"
          echo "Shipping ${MARKETING} (${BUILD})"

      - name: Generate project
        run: xcodegen generate

      - name: Install App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s\n' "$ASC_API_KEY_P8" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

      # Sign AT ARCHIVE TIME (cloud signing via the ASC API key). Entitlements
      # (app groups, iCloud) are baked into each binary by the codesign step
      # that runs during the build — an unsigned archive (CODE_SIGNING_ALLOWED=NO)
      # skips that step, and export-time re-signing CANNOT recover them. That
      # exact failure shipped builds 4+ without the App Group entitlement and
      # broke Share-sheet handoff and manual saves (2026-07-12 incident).
      - name: Archive (cloud-signed)
        run: |
          rm -rf build/ReadLater.xcarchive build/export build/DerivedData
          set -o pipefail
          xcodebuild archive \
            -project ReadLater.xcodeproj \
            -scheme ReadLater \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ReadLater.xcarchive \
            -derivedDataPath build/DerivedData \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=RLQ5M29933 \
            | tail -80

      - name: Export signed IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath build/ReadLater.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ci/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            | tee /tmp/export.log | tail -40
          test -f build/export/ReadLater.ipa

      # Tripwire: a build without the App Group entitlement is broken on
      # device even though it uploads and installs fine. Fail the run instead
      # of shipping it.
      - name: Verify entitlements survived signing
        run: |
          unzip -q build/export/ReadLater.ipa -d build/ipa-check
          APP="build/ipa-check/Payload/ReadLater.app"
          FAIL=0
          for BIN in "$APP" "$APP"/PlugIns/*.appex; do
            echo "=== entitlements: $BIN ==="
            if ! codesign -d --entitlements :- "$BIN" 2>/dev/null | tee /tmp/ent.plist | grep -q "group.com.ellenbartling.readlater"; then
              echo "::error::App Group entitlement missing from ${BIN} — archive-time signing regressed (see 'Archive (cloud-signed)' comment)."
              FAIL=1
            fi
          done
          if ! grep -q "icloud-container-identifiers" <(codesign -d --entitlements :- "$APP" 2>/dev/null); then
            echo "::warning::iCloud entitlements missing from the app binary (CloudKit is code-gated off today, but flag this before re-enabling sync)."
          fi
          exit $FAIL

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            -f build/export/ReadLater.ipa \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
          echo "Uploaded ${{ steps.version.outputs.marketing }} (${{ steps.version.outputs.build }}) — processing usually takes 5–15 minutes."
