name: ReadLater

options:
  bundleIdPrefix: com.ellenbartling
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "RLQ5M29933"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "3"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal

configs:
  Debug: debug
  Release: release

fileGroups:
  - Shared

targets:
  ReadLater:
    type: application
    platform: iOS
    sources:
      - path: ReadLater
      - path: Shared
    resources:
      - path: ReadLater/Resources
        optional: true
    dependencies:
      - target: ShareExtension
      - target: SafariWebExtension
    info:
      path: ReadLater/Info.plist
      properties:
        CFBundleDisplayName: Read Later
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.productivity
        UILaunchScreen: {}
        # Bundled OFL reading fonts (ReadLater/Resources/Fonts/**). Resources
        # copy flat into the bundle root, so plain filenames here.
        UIAppFonts:
          - Literata-VF.ttf
          - Literata-Italic-VF.ttf
          - AtkinsonHyperlegibleNext-VF.ttf
          - AtkinsonHyperlegibleNext-Italic-VF.ttf
          - Lexend-VF.ttf
          - Inter-VF.ttf
          - Inter-Italic-VF.ttf
          - Geist-VF.ttf
        UIBackgroundModes:
          - audio
          - processing
          - fetch
          - remote-notification # CloudKit sync pushes
        BGTaskSchedulerPermittedIdentifiers:
          - com.ellenbartling.readlater.parse
        CFBundleURLTypes:
          - CFBundleURLName: com.ellenbartling.readlater
            CFBundleURLSchemes: [readlater]
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: YES # article content may load http assets
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ellenbartling.readlater
        CODE_SIGN_ENTITLEMENTS: ReadLater/ReadLater.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportsDocumentBrowser: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
      configs:
        Debug:
          # Debug signs with ReadLater.entitlements, which carries the CloudKit
          # entitlement. This condition lets the CloudKit-mirrored store path
          # compile in ONLY for that config; Release (app-group-only
          # entitlements) never defines it, so TestFlight builds stay local-only
          # and never attempt .private(...). See SharedModelContainer.
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) CLOUDKIT_SYNC"
          # Explicit Automatic for device Debug builds: Release's Manual style
          # otherwise bleeds into the target's provisioning mode and blocks
          # Xcode/xcodebuild from minting dev profiles with the App Group +
          # iCloud capabilities.
          CODE_SIGN_STYLE: Automatic
        Release:
          # TestFlight/App Store signing: manual with the human-created
          # Apple Distribution cert + named profiles (cloud/automatic signing
          # cannot manage App Group capabilities with API-key auth — see
          # ship-testflight.yml). Debug/simulator builds are unaffected.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: ReadLater App Store
          # App-group-only entitlements for Release: CloudKit is code-gated
          # off and the App Store profile doesn't carry the iCloud container.
          # Restore ReadLater/ReadLater.entitlements here when sync ships.
          CODE_SIGN_ENTITLEMENTS: ReadLater/ReadLater.release.entitlements

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      - path: Shared
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Read Later
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            # Accept a typed WebURL *or* a plain-text share. Apps like Medium
            # hand the Share Sheet the link inside a plain-text item instead of
            # a public.url attachment, so a WebURL-only rule never activates for
            # them; SupportsText covers that (ShareViewController pulls the URL
            # back out with NSDataDetector). Do NOT add SupportsWebPageWithMaxCount
            # without also bundling an NSExtensionJavaScriptPreprocessingFile —
            # declaring it bare makes Safari hand us a property-list item we
            # can't read.
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ellenbartling.readlater.ShareExtension
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
      configs:
        Debug:
          # See ReadLater target: keep device Debug builds on automatic
          # signing despite Release's manual style.
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          # NOTE: portal profile names are crossed (created against the
          # other extension's App ID) — this mapping matches actual App IDs.
          PROVISIONING_PROFILE_SPECIFIER: ReadLater SafariExt App Store

  SafariWebExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SafariWebExtension
      - path: Shared
    resources:
      - path: SafariWebExtension/Resources
    info:
      path: SafariWebExtension/Info.plist
      properties:
        CFBundleDisplayName: Read Later
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ellenbartling.readlater.SafariWebExtension
        CODE_SIGN_ENTITLEMENTS: SafariWebExtension/SafariWebExtension.entitlements
      configs:
        Debug:
          # See ReadLater target: keep device Debug builds on automatic
          # signing despite Release's manual style.
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: ReadLater ShareExt App Store

  # NOTE: no `Shared` in test sources — those files compile into the app
  # module and arrive via `@testable import ReadLater`. Adding them here too
  # creates a second copy of every model type and ambiguous-type errors.
  ReadLaterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ReadLaterTests
    dependencies:
      - target: ReadLater
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ellenbartling.readlater.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/ReadLater.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)ReadLater
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  ReadLater:
    build:
      targets:
        ReadLater: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ReadLaterTests
    archive:
      config: Release
