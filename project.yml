name: ReadLater

options:
  bundleIdPrefix: com.ellenbartling
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "" # fill in for signing
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal

configs:
  Debug: debug
  Release: release

fileGroups:
  - Shared

targets:
  ReadLater:
    type: application
    platform: iOS
    sources:
      - path: ReadLater
      - path: Shared
    resources:
      - path: ReadLater/Resources
        optional: true
    dependencies:
      - target: ShareExtension
      - target: SafariWebExtension
    info:
      path: ReadLater/Info.plist
      properties:
        CFBundleDisplayName: Read Later
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.productivity
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
          - processing
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.ellenbartling.readlater.parse
        CFBundleURLTypes:
          - CFBundleURLName: com.ellenbartling.readlater
            CFBundleURLSchemes: [readlater]
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: YES # article content may load http assets
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ellenbartling.readlater
        CODE_SIGN_ENTITLEMENTS: ReadLater/ReadLater.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportsDocumentBrowser: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      - path: Shared
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Read Later
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            # WebURL only. Do NOT add SupportsWebPageWithMaxCount without also
            # bundling an NSExtensionJavaScriptPreprocessingFile — declaring it
            # bare makes Safari hand us a property-list item we can't read.
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ellenbartling.readlater.ShareExtension
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements

  SafariWebExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SafariWebExtension
      - path: Shared
    resources:
      - path: SafariWebExtension/Resources
    info:
      path: SafariWebExtension/Info.plist
      properties:
        CFBundleDisplayName: Read Later
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ellenbartling.readlater.SafariWebExtension
        CODE_SIGN_ENTITLEMENTS: SafariWebExtension/SafariWebExtension.entitlements

  # NOTE: no `Shared` in test sources — those files compile into the app
  # module and arrive via `@testable import ReadLater`. Adding them here too
  # creates a second copy of every model type and ambiguous-type errors.
  ReadLaterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ReadLaterTests
    dependencies:
      - target: ReadLater
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ellenbartling.readlater.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/ReadLater.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)ReadLater
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  ReadLater:
    build:
      targets:
        ReadLater: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ReadLaterTests
    archive:
      config: Release
